# Eval Harness - Phase 2 Minimal
# Format: YAML 1.2
# Ein einfacher Test für den example-weather Skill

eval_id: "eval-example-weather-001"
title: "Test: example-weather Skill"
description: "Validiert dass der Weather-Skill korrekt geladen und erkannt wird"
created_at: "2026-03-25T22:40:00+01:00"
version: "1.0"

target:
  type: "skill"
  id: "example-weather"
  source: "registry/skills.yaml"

# Test-Kriterien
criteria:
  - id: "exists"
    description: "Skill existiert in Registry"
    check: "skills.yaml contains 'example-weather'"
    expected: true
    weight: 30
    
  - id: "has_description"
    description: "Skill hat Beschreibung"
    check: "example-weather.description is not empty"
    expected: true
    weight: 20
    
  - id: "has_keywords"
    description: "Skill hat Keywords im Search-Index"
    check: "search-index.json contains keywords for example-weather"
    expected: true
    weight: 25
    
  - id: "files_exist"
    description: "Skill-Dateien existieren"
    check: "SKILL.md exists in skills/example-weather/"
    expected: true
    weight: 25

# Test-Steps (manuell oder automatisiert)
steps:
  - name: "Load Registry"
    action: "read registry/skills.yaml"
    expected: "File loads without error"
    
  - name: "Find Skill"
    action: "Parse skills list for 'example-weather'"
    expected: "Skill found with metadata"
    
  - name: "Check Search Index"
    action: "read registry/search-index.json"
    expected: "Skill entry exists in entries array"
    
  - name: "Verify Files"
    action: "List skills/example-weather/"
    expected: "SKILL.md exists"

# Erfolgskriterium
success_threshold: 75  # 75% der gewichteten Kriterien müssen passen

# Output
output:
  format: "markdown"
  location: "memory/evals/"
  template: |
    # Eval Report: {eval_id}
    **Datum:** {timestamp}
    **Target:** {target.id}
    **Ergebnis:** {result}
    **Score:** {score}%
    
    ## Kriterien
    {criteria_results}
    
    ## Zusammenfassung
    {summary}

# Bei Fehler
on_failure:
  action: "log"
  notify: false
  create_ticket: false
