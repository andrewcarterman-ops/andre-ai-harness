# ═══════════════════════════════════════════════════════════════
# ECC Second Brain - Vault Manifest
# ═══════════════════════════════════════════════════════════════
# Version: 1.0.0
# Beschreibung: Referenz-Struktur für Vault-Validierung
# ═══════════════════════════════════════════════════════════════

# Vault-Metadaten
vault:
  name: "SecondBrain"
  version: "1.0.0"
  created: "2024-01-01"
  author: "Andrew Openclaw"

# ═══════════════════════════════════════════════════════════════
# ERFORDERLICHE VERZEICHNISSE
# ═══════════════════════════════════════════════════════════════
required_directories:
  # Core-Struktur
  - "00-Inbox"
  - "01-Projects"
  - "02-Areas"
  - "03-Resources"
  - "04-Archive"
  - "05-Templates"
  
  # Obsidian-Konfiguration
  - ".obsidian"
  - ".obsidian/snippets"
  - ".obsidian/plugins"
  - ".obsidian/plugins/ecc-vault"
  - ".obsidian/themes"
  
  # ECC-System
  - ".obsidian/context"
  - ".obsidian/checkpoints"
  - ".obsidian/logs"
  - ".backups"
  - "reports"
  
  # Content-Struktur
  - "01-Projects/Active"
  - "01-Projects/Completed"
  - "02-Areas/Personal"
  - "02-Areas/Professional"
  - "03-Resources/Notes"
  - "03-Resources/References"
  - "04-Archive/2024"
  - "05-Templates/Daily"
  - "05-Templates/Project"

# ═══════════════════════════════════════════════════════════════
# ERFORDERLICHE DATEIEN
# ═══════════════════════════════════════════════════════════════
required_files:
  # Dokumentation
  - "README.md"
  - "CHANGELOG.md"
  - "LICENSE.md"
  
  # Obsidian-Konfiguration
  - ".obsidian/app.json"
  - ".obsidian/appearance.json"
  - ".obsidian/core-plugins.json"
  - ".obsidian/hotkeys.json"
  
  # ECC-Konfiguration
  - ".obsidian/plugins/ecc-vault/manifest.json"
  - ".obsidian/plugins/ecc-vault/styles.css"
  
  # Templates
  - "05-Templates/Daily/daily-note.md"
  - "05-Templates/Project/project-template.md"
  
  # Index-Dateien
  - "01-Projects/index.md"
  - "02-Areas/index.md"
  - "03-Resources/index.md"

# ═══════════════════════════════════════════════════════════════
# OPTIONALE DATEIEN
# ═══════════════════════════════════════════════════════════════
optional_files:
  - "CONTRIBUTING.md"
  - ".obsidian/workspace.json"
  - ".obsidian/graph.json"
  - "00-Inbox/README.md"

# ═══════════════════════════════════════════════════════════════
# ERLAUBTE DATEIENDUNGEN
# ═══════════════════════════════════════════════════════════════
allowed_extensions:
  - ".md"        # Markdown
  - ".txt"       # Text
  - ".json"      # JSON
  - ".yaml"      # YAML
  - ".yml"       # YAML
  - ".css"       # Stylesheets
  - ".js"        # JavaScript
  - ".png"       # Bilder
  - ".jpg"       # Bilder
  - ".jpeg"      # Bilder
  - ".gif"       # Bilder
  - ".svg"       # Vektorgrafiken
  - ".pdf"       # Dokumente
  - ".zip"       # Archive (in .backups)
  - ".log"       # Logs (in .obsidian/logs)

# ═══════════════════════════════════════════════════════════════
# STRUKTUR-REGELN
# ═══════════════════════════════════════════════════════════════
structure_rules:
  # Maximale Tiefe
  max_directory_depth: 5
  
  # Maximale Dateigröße (MB)
  max_file_size_mb: 100
  
  # Maximale Dateinamenlänge
  max_filename_length: 255
  
  # Erlaubte Zeichen in Dateinamen
  allowed_filename_chars: "a-zA-Z0-9_-. äöüÄÖÜß"
  
  # Verbotene Zeichen
  forbidden_chars:
    - "<"
    - ">"
    - ":"
    - "\""
    - "/"
    - "\\"
    - "|"
    - "?"
    - "*"
  
  # Reservierte Namen (Windows)
  reserved_names:
    - "CON"
    - "PRN"
    - "AUX"
    - "NUL"
    - "COM1"
    - "COM2"
    - "COM3"
    - "COM4"
    - "COM5"
    - "COM6"
    - "COM7"
    - "COM8"
    - "COM9"
    - "LPT1"
    - "LPT2"
    - "LPT3"
    - "LPT4"
    - "LPT5"
    - "LPT6"
    - "LPT7"
    - "LPT8"
    - "LPT9"

# ═══════════════════════════════════════════════════════════════
# TEMPLATES
# ═══════════════════════════════════════════════════════════════
templates:
  README:
    path: "README.md"
    content: |
      # Second Brain
      
      Persönliches Wissensmanagement-System basierend auf der PARA-Methode.
      
      ## Struktur
      
      - **00-Inbox** - Eingang für neue Notizen
      - **01-Projects** - Aktive Projekte
      - **02-Areas** - Verantwortungsbereiche
      - **03-Resources** - Referenzmaterialien
      - **04-Archive** - Abgeschlossenes
      - **05-Templates** - Wiederverwendbare Vorlagen
      
      ## ECC Integration
      
      Diese Vault verwendet das ECC-Second-Brain-Framework für:
      - Automatische Backups
      - Drift Detection
      - Context Management
      - Verschlüsselte API-Key-Speicherung
  
  daily_note:
    path: "05-Templates/Daily/daily-note.md"
    content: |
      ---
      date: {{date}}
      tags: [daily-note]
      ---
      
      # {{date:YYYY-MM-DD}}
      
      ## Prioritäten
      
      1. 
      2. 
      3. 
      
      ## Notizen
      
      
      ## Links
      
      
      ## Rückblick
      
  
  project:
    path: "05-Templates/Project/project-template.md"
    content: |
      ---
      created: {{date}}
      status: planning
      priority: medium
      tags: [project]
      ---
      
      # {{title}}
      
      ## Ziel
      
      
      ## Aufgaben
      
      - [ ] 
      
      ## Ressourcen
      
      
      ## Notizen
      
      
      ## Abschluss
      
      - Abgeschlossen am: 
      - Ergebnis: 

# ═══════════════════════════════════════════════════════════════
# METADATEN
# ═══════════════════════════════════════════════════════════════
metadata:
  checksum_algorithm: "SHA256"
  manifest_version: "1.0.0"
  last_updated: "2024-01-01T00:00:00"
  generated_by: "ECC Drift Detection"
