# Projekt-Templates (für zukünftige Projekte)
templates:
  - id: "template-web-app"
    name: "Web Application"
    description: "Standard-Template für Web-App-Projekte"
    default_skills:
      - "secure-api-client"
      - "mission-control"
    default_paths:
      docs: "docs/{project-id}/"
      src: "src/{project-id}/"
    
  - id: "template-data-analysis"
    name: "Data Analysis"
    description: "Template für Datenanalyse-Projekte"
    default_skills:
      - "secure-api-client"
    default_paths:
      data: "data/{project-id}/"
      notebooks: "notebooks/{project-id}/"

# Global-Einstellungen
globals:
