name: Bug Report
description: Report a bug in the framework
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened?
    validations:
      required: true
      
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      description: How can we reproduce this?
      placeholder: |
        1. Run command: ...
        2. See error
    validations:
      required: true
      
  - type: input
    id: version
    attributes:
      label: Framework Version
      placeholder: "e.g., 1.2.0"
    validations:
      required: true
      
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Registry
        - Agents
        - Skills
        - Scripts
        - Documentation
        - Other
    validations:
      required: true
